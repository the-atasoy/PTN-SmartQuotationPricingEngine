version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    networks:
      - smart-network
    environment:
      POSTGRES_DB: smart_quotation
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - postgres-data:/var/lib/postgresql/data

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - smart-network
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8025 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    image: smart-quotation-backend
    build: ./backend
    ports:
      - "5100:5100"
    networks:
      - smart-network
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://0.0.0.0:5100
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=smart_quotation;Username=postgres;Password=postgres
      - Jwt__Secret=HtGbRs3LxtCeEvA0Xnbkw6hbnpuIXVSlCIlOSNU3+Nu3ZgwQ4d5+H/yu+baR1bmiqkP+A5fkDaK+xTuBQhdKvA==
      - Jwt__Issuer=smart-quotation
      - Jwt__Audience=smart-quotation
      - Email__SmtpHost=mailpit
      - Email__SmtpPort=1025
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:5100/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  frontend:
    image: smart-quotation-frontend
    build: ./frontend
    ports:
      - "3000:3000"
    networks:
      - smart-network
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:5100
      - NEXT_PUBLIC_DEFAULT_LOCALE=tr
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:3000 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres-data:

networks:
  smart-network:
